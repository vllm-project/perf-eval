# Nemotron-3-Super-120B-A12B (FP8) on H200
# Hybrid Mamba-2 + LatentMoE architecture (120B total, 12B active).
# TP=8 + EP on 8xH200; MTP speculative decoding enabled.
name: nemotron_3_super-h200
gpu: H200
num_gpus: 8
nightly: true

vllm:
  model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
  serve_args: >-
    --tensor-parallel-size 8
    --enable-expert-parallel
    --max-model-len 32768
    --speculative-config.method mtp
    --speculative-config.num_speculative_tokens 5
    --trust-remote-code
    --enable-auto-tool-choice
    --tool-call-parser qwen3_coder
    --reasoning-parser nemotron_v3

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

bfcl:
  test_categories:
    - simple_python
    - multiple
    - parallel
    - parallel_multiple
    - multi_turn
  num_threads: 16
  max_test_cases:
    multi_turn: 240

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
