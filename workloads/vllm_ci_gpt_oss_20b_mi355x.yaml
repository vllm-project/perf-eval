# Ported from AFO-LLM configs/vllm_ci.yaml
# GPT-OSS 20B on MI355X with upstream vLLM (VLLM_USE_V1=1)
# SERVING: TP=1, in=[1024,8192] x out=1024 x conc=[4,8,16,32,64,128]
# ACCURACY: gsm8k 5-shot
name: vllm-ci-gpt-oss-20b-mi355x
gpu: MI355X
num_gpus: 1
nightly: false

vllm:
  model: openai/gpt-oss-20b
  serve_args: >-
    --tensor-parallel-size 1
    --dtype auto
    --max-num-batched-tokens 8192
    --max-num-seqs 1024
    --gpu-memory-utilization 0.95
    --max-model-len 10240
    --block-size 64
    --async-scheduling
    --trust-remote-code
  env:
    VLLM_ROCM_USE_AITER: 1
    VLLM_USE_AITER_UNIFIED_ATTENTION: 1
    VLLM_ROCM_USE_AITER_MHA: 0
    HSA_NO_SCRATCH_RECLAIM: 1
    NCCL_MIN_NCHANNELS: 112
    USE_FASTSAFETENSOR: 1
    SAFETENSORS_FAST_GPU: 1

lm_eval:
  model_args:
    tokenized_requests: false
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 10240
        max_gen_toks: 8192

vllm_bench:
  configs:
    - name: isl1024-osl1024-conc4
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    - name: isl1024-osl1024-conc8
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 8
    - name: isl1024-osl1024-conc16
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 16
    - name: isl1024-osl1024-conc32
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 32
    - name: isl1024-osl1024-conc64
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 320
      max_concurrency: 64
    - name: isl1024-osl1024-conc128
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 640
      max_concurrency: 128
    - name: isl8192-osl1024-conc4
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    - name: isl8192-osl1024-conc8
      backend: openai
