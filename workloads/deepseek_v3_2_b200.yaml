# DeepSeek-V3.2 on B200. The vLLM recipe recommends DP/EP on Blackwell
# instead of TP8; keep the context window bounded for the 8k/1k bench workload.
name: deepseek_v3_2-b200
gpu: B200
num_gpus: 8
nightly: false
bench_only: true

vllm:
  model: deepseek-ai/DeepSeek-V3.2
  env:
    TRITON_PTXAS_PATH: /usr/local/cuda/bin/ptxas
  serve_args: >-
    --data-parallel-size 8
    --enable-expert-parallel
    --max-model-len 40960
    --tokenizer-mode deepseek_v32
    --tool-call-parser deepseek_v32
    --reasoning-parser deepseek_v3
    --enable-auto-tool-choice
    --trust-remote-code

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 40960
        max_gen_toks: 32768

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai-chat
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
