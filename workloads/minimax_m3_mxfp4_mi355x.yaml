# MiniMax-M3-MXFP4 on MI355X
name: minimax_m3_mxfp4-mi355x
gpu: MI355X
num_gpus: 8
nightly: true

vllm:
  model: amd/MiniMax-M3-MXFP4
  env:
    VLLM_ROCM_USE_AITER: 1
    VLLM_ROCM_USE_AITER_MOE: 1
    VLLM_USE_BREAKABLE_CUDAGRAPH: 0
  serve_args: >-
    --tensor-parallel-size 4
    --trust-remote-code
    --block-size 128
    --max-model-len 9472
    --gpu-memory-utilization 0.8
    --attention-backend TRITON_ATTN
    --tool-call-parser minimax_m3
    --enable-auto-tool-choice
    --reasoning-parser minimax_m3
    --moe-backend aiter
    

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 40960
        max_gen_toks: 32768

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
