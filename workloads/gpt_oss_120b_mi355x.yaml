# GPT-OSS 120B on MI355X
name: gpt_oss_120b-mi355x
gpu: MI355X
num_gpus: 8
nightly: true

vllm:
  model: openai/gpt-oss-120b
  env:
    VLLM_ROCM_USE_AITER: 1
  serve_args: >-
    --tensor-parallel-size 1
    --trust-remote-code
    --kv-cache-dtype=fp8

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
