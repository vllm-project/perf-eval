# GPT-OSS 120B on B200 (single B200, TP=1)
# Recipe: https://recipes.vllm.ai/openai/gpt-oss-120b
name: gpt_oss_120b-b200
gpu: B200
num_gpus: 1
nightly: true

vllm:
  model: openai/gpt-oss-120b
  env:
    VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8: 1
  serve_args: >-
    --tensor-parallel-size 1
    --kv-cache-dtype fp8
    --no-enable-prefix-caching
    --max-cudagraph-capture-size 2048
    --max-num-batched-tokens 8192
    --stream-interval 20
    --max-model-len 32768
    --max-num-seqs 512
    --tool-call-parser openai
    --enable-auto-tool-choice

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

bfcl:
  test_categories:
    - simple_python
    - multiple
    - multi_turn
  num_threads: 8

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
