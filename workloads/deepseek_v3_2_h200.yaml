# DeepSeek-V3.2 on H200
# Recipe: TP=2 preferred on Hopper (TP=8 hits FlashMLA-Sparse head-padding overhead).
# With 8 GPUs we run TP=2 x DP=4 + EP.
name: deepseek_v3_2-h200
gpu: H200
num_gpus: 8
nightly: true

vllm:
  model: deepseek-ai/DeepSeek-V3.2
  env:
    TRITON_PTXAS_PATH: /usr/local/cuda/bin/ptxas
  serve_args: >-
    --tensor-parallel-size 2
    --data-parallel-size 4
    --enable-expert-parallel
    --max-model-len 16384
    --tokenizer-mode deepseek_v32
    --tool-call-parser deepseek_v32
    --reasoning-parser deepseek_v3
    --enable-auto-tool-choice
    --trust-remote-code

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 16384
        max_gen_toks: 4096

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai-chat
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
