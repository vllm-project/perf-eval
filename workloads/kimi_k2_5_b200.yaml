# Kimi-K2.5 on B200 (per vLLM recipe: 8xB200 verified)
name: kimi_k2_5-b200
gpu: B200
num_gpus: 8
nightly: false

vllm:
  model: moonshotai/Kimi-K2.5
  serve_args: >-
    --tensor-parallel-size 8
    --mm-encoder-tp-mode data
    --tool-call-parser kimi_k2
    --reasoning-parser kimi_k2
    --enable-auto-tool-choice
    --trust-remote-code

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 40960
        max_gen_toks: 32768

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai-chat
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
