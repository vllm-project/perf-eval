# Ported from AFO-LLM configs/vllm_ci.yaml
# DeepSeek-R1-0528 on MI355X with upstream vLLM (VLLM_USE_V1=1)
# SERVING: TP=8, in=[1024,8192] x out=1024 x conc=[4,8,16,32,64]
# ACCURACY: gsm8k 5-shot
# block-size=1 required for MLA; async-scheduling per vllm_ci extra_args
name: vllm-ci-deepseek-r1-mxfp4-mi355x
gpu: MI355X
num_gpus: 8
nightly: false

vllm:
  model: amd/DeepSeek-R1-MXFP4-Preview
  serve_args: >-
    --tensor-parallel-size 8
    --dtype auto
    --max-num-batched-tokens 131072
    --max-num-seqs 1024
    --gpu-memory-utilization 0.92
    --max-model-len 10240
    --block-size 1
    --async-scheduling
    --compilation-config {"pass_config":{"eliminate_noops":false},"cudagraph_mode":"FULL","custom_ops":["+rms_norm","+silu_and_mul","+quant_fp8"],"splitting_ops":[]}
  env:
    VLLM_ROCM_QUICK_REDUCE_QUANTIZATION: INT4
    VLLM_ROCM_USE_AITER: 1
    HSA_NO_SCRATCH_RECLAIM: 1
    NCCL_MIN_NCHANNELS: 112
    USE_FASTSAFETENSOR: 1
    SAFETENSORS_FAST_GPU: 1

lm_eval:
  model_args:
    tokenized_requests: false
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 10240

vllm_bench:
  configs:
    - name: isl1024-osl1024-conc4
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    - name: isl1024-osl1024-conc8
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 8
    - name: isl1024-osl1024-conc16
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 16
    - name: isl1024-osl1024-conc32
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 32
    - name: isl1024-osl1024-conc64
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 320
      max_concurrency: 64
    - name: isl8192-osl1024-conc4
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    - name: isl8192-osl1024-conc8
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 8
    - name: isl8192-osl1024-conc16
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 16
    - name: isl8192-osl1024-conc32
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 32
    - name: isl8192-osl1024-conc64
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 320
      max_concurrency: 64
