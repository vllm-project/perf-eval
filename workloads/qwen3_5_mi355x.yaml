# Qwen3.5 MI355X
name: qwen3_5-mi355x
gpu: MI355X
num_gpus: 8
nightly: true

vllm:
  model: Qwen/Qwen3.5-397B-A17B-FP8
  env:
    VLLM_ROCM_USE_AITER: 1
  serve_args: >-
    --tensor-parallel-size 8
    --enable-expert-parallel
    --reasoning-parser qwen3
    --trust-remote-code

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 40960

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
