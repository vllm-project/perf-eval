# Kimi-K2.5 on H200 (per vLLM recipe: 8xH200 verified)
name: kimi_k2_5-h200
gpu: H200
num_gpus: 8
nightly: true

vllm:
  model: moonshotai/Kimi-K2.5
  serve_args: >-
    --tensor-parallel-size 8
    --mm-encoder-tp-mode data
    --tool-call-parser kimi_k2
    --reasoning-parser kimi_k2
    --enable-auto-tool-choice
    --trust-remote-code

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 40960
        max_gen_toks: 32768
