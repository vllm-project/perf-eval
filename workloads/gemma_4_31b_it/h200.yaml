# Gemma4 31B (FP8) on H200 (8xH200, TP=1)
name: gemma_4_31b_it_h200
gpu: H200
num_gpus: 8
nightly: true

vllm:
  model: RedHatAI/gemma-4-31B-it-FP8-dynamic
  serve_args: >-
    --tensor-parallel-size 1
    --kv-cache-dtype fp8
    --tool-call-parser gemma4
    --reasoning-parser gemma4
    --enable-auto-tool-choice

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

bfcl:
  test_categories:
    - simple_python
    - multiple
    - parallel
    - parallel_multiple
    - multi_turn
  num_threads: 16

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
