# DeepSeek-V4-Pro on H200 (8xH200 single-node, DP+EP)
name: deepseek_v4_pro-h200
gpu: H200
num_gpus: 8
nightly: true
timeout_in_minutes: 200

vllm:
  model: deepseek-ai/DeepSeek-V4-Pro
  env:
    TRITON_PTXAS_PATH: /usr/local/cuda/bin/ptxas
  serve_args: >-
    --data-parallel-size 8
    --enable-expert-parallel
    --max-model-len 32768
    --max-num-seqs 512
    --max-num-batched-tokens 512
    --kv-cache-dtype fp8
    --block-size 256
    --tokenizer-mode deepseek_v4
    --gpu-memory-utilization 0.95
    --tool-call-parser deepseek_v4
    --reasoning-parser deepseek_v4
    --enable-auto-tool-choice
    --trust-remote-code
    --no-enable-flashinfer-autotune 
    --compilation-config {"mode":0,"cudagraph_mode":"FULL_DECODE_ONLY"}


lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

bfcl:
  test_categories:
    - simple_python
    - multiple
    - parallel
    - parallel_multiple
    - multi_turn
  num_threads: 16

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
