# Nemotron-3-Super-120B-A12B NVFP4 on B200 (TP=1)
# Recipe: https://recipes.vllm.ai/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
name: nemotron_3_super-b200
gpu: B200
num_gpus: 8
nightly: true

vllm:
  model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
  serve_args: >-
    --trust-remote-code
    --tensor-parallel-size 1
    --enable-auto-tool-choice
    --tool-call-parser qwen3_coder
    --reasoning-parser nemotron_v3

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai-chat
      dataset: speed_bench
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
      speed_bench_dataset_subset: throughput_8k
      speed_bench_category: low_entropy
