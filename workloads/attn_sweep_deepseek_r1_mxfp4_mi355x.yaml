    # - name: isl1024-osl1024-conc32
    #   dataset: random
    #   input_len: 1024
    #   output_len: 1024
    #   num_prompts: 200
    #   max_concurrency: 32
    - name: isl1024-osl1024-conc64
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 64
    - name: isl8192-osl1024-conc4
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    # - name: isl8192-osl1024-conc8
