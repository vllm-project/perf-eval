# Attention Backend sweep 
# SERVING only — TP=8, MXFP4 preview checkpoint
# in=[1024,8192] x out=1024 x conc=[4,8,16,32,64]
#
name: attn-sweep-deepseek-r1-mxfp4-MI355X
gpu: MI355X
num_gpus: 8
nightly: false

vllm:
  model: amd/DeepSeek-R1-MXFP4-Preview
  env:
    VLLM_ROCM_USE_AITER: 1
  serve_args: >-
    --tensor-parallel-size 8
    --dtype auto
    --kv-cache-dtype fp8
    --max-num-batched-tokens 131072
    --max-num-seqs 32
    --gpu-memory-utilization 0.92
    --max-model-len 10240
    --block-size 1
    --async-scheduling
    --compilation-config {"pass_config":{"eliminate_noops":false},"cudagraph_mode":"FULL","custom_ops":["+rms_norm","+silu_and_mul","+quant_fp8"],"splitting_ops":[]}
  # adding this to compilation-config errors on unrecognized flags "pass_config":{"enable_attn_fusion":true,"enable_noop":true,"enable_fusion":true},   
  attention_backends:
    - default
    - ROCM_AITER_TRITON_MLA
    - ROCM_AITER_MLA
    #- ROCM_AITER_MLA_SPARSE #not supported Reason: ['non-sparse not supported']
    

vllm_bench:
  configs:
    - name: isl1024-osl1024-conc4
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    # - name: isl1024-osl1024-conc8
    #   dataset: random
    #   input_len: 1024
    #   output_len: 1024
    #   num_prompts: 200
