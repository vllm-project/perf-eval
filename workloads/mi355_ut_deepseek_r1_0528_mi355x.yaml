# Ported from AFO-LLM configs/mi355_ut.yaml
# DeepSeek-R1-0528 on MI355X (ATOM/OOT env set, no VLLM_USE_V1)
# SERVING: TP=8, in=1024 x out=1024 x conc=[1,32,64]
# ACCURACY: gsm8k 5-shot
# block-size=1 required for MLA; async-scheduling per mi355_ut extra_args
name: mi355-ut-deepseek-r1-0528-mi355x
gpu: MI355X
num_gpus: 8
nightly: false

vllm:
  model: deepseek-ai/DeepSeek-R1-0528
  serve_args: >-
    --tensor-parallel-size 8
    --dtype auto
    --max-num-batched-tokens 131072
    --max-num-seqs 1024
    --gpu-memory-utilization 0.95
    --max-model-len 16384
    --block-size 1
    --async-scheduling
  env:
    VLLM_ROCM_QUICK_REDUCE_QUANTIZATION: INT4
    VLLM_ROCM_USE_AITER: 1
    HSA_NO_SCRATCH_RECLAIM: 1
    NCCL_MIN_NCHANNELS: 112
    USE_FASTSAFETENSOR: 1
    SAFETENSORS_FAST_GPU: 1

lm_eval:
  model_args:
    tokenized_requests: false
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 16384

vllm_bench:
  configs:
    - name: isl1024-osl1024-conc1
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 1
    - name: isl1024-osl1024-conc32
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 32
    - name: isl1024-osl1024-conc64
      backend: openai
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 320
      max_concurrency: 64
