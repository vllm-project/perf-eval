# MiniMax-M3 MXFP4 on MI355X
name: minimax_m3-mi355x
gpu: MI355X
num_gpus: 8
nightly: true

vllm:
  model: amd/MiniMax-M3-MXFP4
  env:
    VLLM_ROCM_USE_AITER: 1
    VLLM_ROCM_USE_AITER_FUSION_SHARED_EXPERTS: 1
    VLLM_ROCM_USE_AITER_MOE: 1
  serve_args: >-
    --tensor-parallel-size 4
    --trust-remote-code
    --block-size 128
    --attention-backend TRITON_ATTN
    --moe-backend aiter
    --kv-cache-dtype fp8
    --mm-encoder-tp-mode data
    --mm-encoder-attn-backend ROCM_AITER_FA
    --tool-call-parser minimax_m3
    --enable-auto-tool-choice
    --reasoning-parser minimax_m3

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 16
        max_length: 32768
        max_gen_toks: 8192

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-16
      backend: openai-chat
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 16
