# GPT-OSS 120B on MI355X
name: attn_sweep_gpt_oss_120b-mi355x
gpu: MI355X
num_gpus: 8
# Opt-in for now: WORKLOADS=gpt_oss_120b_mi355x
nightly: false

vllm:
  model: openai/gpt-oss-120b
  env:
    VLLM_ROCM_USE_AITER: 1
  serve_args: >-
    --tensor-parallel-size 1
    --trust-remote-code
    --kv-cache-dtype=fp8
  attention_backends:
    - default
    #- ROCM_ATTN #attention sinks not supported
    - TRITON_ATTN
    #- ROCM_AITER_UNIFIED_ATTN this one is the default
    #- ROCM_AITER_FA #fails "attention sinks not supported"


