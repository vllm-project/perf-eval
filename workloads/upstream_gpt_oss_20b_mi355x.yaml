# Ported from AFO-LLM configs/vllm_upstream.yaml
# ACCURACY (TP=1) + SERVING (TP=1, in=[1024,8192] x out=1024 x conc=[4,8,16,32,64,128])
# extra_args block-size=64 and async-scheduling go into serve_args.
# ACCURACY uses lm_eval (gsm8k 5-shot, matching other upstream workloads).
name: upstream-gpt-oss-20b-mi355x
gpu: MI355X
num_gpus: 1
nightly: false

vllm:
  model: openai/gpt-oss-20b
  serve_args: >-
    --tensor-parallel-size 1
    --dtype auto
    --max-num-batched-tokens 8192
    --max-num-seqs 1024
    --gpu-memory-utilization 0.95
    --max-model-len 10240
    --block-size 64
    --async-scheduling
  env:
    VLLM_ROCM_USE_AITER: 1
    VLLM_ROCM_USE_AITER_UNIFIED_ATTENTION: 1
    VLLM_ROCM_USE_AITER_MHA: 0
    HSA_NO_SCRATCH_RECLAIM: 1
    NCCL_MIN_NCHANNELS: 112
    USE_FASTSAFETENSOR: 1
    SAFETENSORS_FAST_GPU: 1
attention_backends:
  - ROCM_AITER_UNIFIED_ATTN

lm_eval:
  model_args:
    tokenized_requests: false
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 10240

vllm_bench:
  configs:
    - name: isl1024-osl1024-conc4
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    - name: isl1024-osl1024-conc8
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 8
    - name: isl1024-osl1024-conc16
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 16
    - name: isl1024-osl1024-conc32
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 32
    - name: isl1024-osl1024-conc64
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 64
    - name: isl1024-osl1024-conc128
      dataset: random
      input_len: 1024
      output_len: 1024
      num_prompts: 200
      max_concurrency: 128
    - name: isl8192-osl1024-conc4
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 4
    - name: isl8192-osl1024-conc8
      dataset: random
      input_len: 8192
      output_len: 1024
      num_prompts: 200
      max_concurrency: 8
    - name: isl8192-osl1024-conc16
      dataset: random
      input_len: 8192
