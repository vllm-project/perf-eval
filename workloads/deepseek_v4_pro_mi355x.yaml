# DeepSeek-V4-Pro on MI355X
name: deepseek_v4_pro-mi355x
gpu: MI355X
num_gpus: 8
# Opt-in for now: WORKLOADS=deepseek_v4_pro_mi355x
nightly: false

vllm:
  model: deepseek-ai/DeepSeek-V4-Pro
  env:
    VLLM_ROCM_USE_AITER: 1
  serve_args: >-
    --tensor-parallel-size 8
    --kv-cache-dtype fp8
    --trust-remote-code
    --no-enable-prefix-caching
    --quantization deepseek_v4_fp8

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai-chat
      dataset: speed_bench
      input_len: 8192
      output_len: 1024
      num_prompts: 512
      max_concurrency: 128
      speed_bench_dataset_subset: throughput_8k
      speed_bench_category: low_entropy
