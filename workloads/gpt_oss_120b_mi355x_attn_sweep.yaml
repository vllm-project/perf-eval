# GPT-OSS 120B on MI355X
name: attn_sweep_gpt_oss_120b-mi355x
gpu: MI355X
num_gpus: 8
# Opt-in for now: WORKLOADS=gpt_oss_120b_mi355x
nightly: false

vllm:
  model: openai/gpt-oss-120b
  env:
    VLLM_ROCM_USE_AITER: 1
  serve_args: >-
    --tensor-parallel-size 1
    --trust-remote-code
    --kv-cache-dtype=fp8
  attention_backends:
    - ROCM_AITER_UNIFIED_ATTN
    - ROCM_AITER_FA

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 32768
        max_gen_toks: 8192

vllm_bench:
  configs:
    - name: 8k-in-1k-out-conc-128
      backend: openai-chat
      dataset: speed_bench
      input_len: 1024
      output_len: 1024
      num_prompts: 5
      max_concurrency: 128
      speed_bench_dataset_subset: throughput_8k
      speed_bench_category: low_entropy
