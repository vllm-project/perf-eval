# Qwen3.5 h200
name: qwen3_5-h200
gpu: H200
num_gpus: 8
nightly: true

vllm:
  model: Qwen/Qwen3.5-397B-A17B-FP8
  serve_args: >-
    --tensor-parallel-size 8
    --enable-expert-parallel
    --reasoning-parser qwen3
    --language-model-only
    --trust-remote-code
    --max-num-seqs 256
    --max-model-len auto

lm_eval:
  model_args:
    tokenized_requests: false
    tokenizer_backend: null
    timeout: 6000
  tasks:
    - name: gsm8k
      num_fewshot: 5
      model_args:
        num_concurrent: 64
        max_length: 40960
